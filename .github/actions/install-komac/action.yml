name: install-komac
description: Downloads Komac in a reliable way

outputs:
  komac-path:
    description: Path to komac binary
    value: ${{ steps.install.outputs.path }}

runs:
  using: "composite"
  steps:
    - name: Install GitHub CLI (if missing)
      shell: bash
      run: |
        if ! command -v gh >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y gh
        fi

    - name: Authenticate gh
      shell: bash
      run: |
        echo "${{ github.token }}" | gh auth login --with-token

    - name: Download Komac release
      id: install
      shell: bash
      run: |
        set -euo pipefail

        TMP_DIR="$(mktemp -d)"
        echo "Using temp dir: $TMP_DIR"

        # deterministisch: latest release holen
        TAG=$(gh release view --repo russellbanks/Komac --json tagName -q .tagName)

        echo "Latest Komac tag: $TAG"

        # gezielt Asset ziehen (kein grep, kein JSON parsing)
        gh release download "$TAG" \
          --repo russellbanks/Komac \
          --pattern "*linux*amd64*" \
          --dir "$TMP_DIR"

        FILE=$(find "$TMP_DIR" -type f -name "*komac*" | head -n 1 || true)

        if [[ -z "${FILE:-}" ]]; then
          echo "::error::Komac binary not found after download"
          exit 1
        fi

        chmod +x "$FILE"

        echo "Komac version:"
        "$FILE" --version || true

        echo "path=$FILE" >> "$GITHUB_OUTPUT"