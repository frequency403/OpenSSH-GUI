name: Unit Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
      - development
  workflow_call:

concurrency:
  group: tests-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Run on:
    #   - workflow_call (gate for staging + build)
    #   - pull_request targeting development, master, or main
    #   - force push to master/main
    # NOT on normal (non-forced) pushes to master/main — those are handled
    # by auto-tag.yml or build.yml which call this via workflow_call.
    if: >
      github.event_name == 'workflow_call' ||
      github.event_name == 'pull_request'  ||
      (github.event_name == 'push' && github.event.forced == true)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET environment
        uses: ./.github/actions/dotnet-setup

      - name: Restore dependencies
        run: dotnet restore OpenSSH_GUI.slnx

      - name: Build solution
        run: dotnet build OpenSSH_GUI.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test OpenSSH_GUI.slnx --configuration Release --no-build --verbosity normal
