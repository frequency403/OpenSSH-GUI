name: Build and Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*' # Trigger only on version tags like v1.2.3

permissions:
  contents: write

jobs:
  # --- JOB 1: BUILD ---
  build:
    uses: ./.github/workflows/build-and-package.yml
    with:
      version: ${{ github.ref_name }}
      is_nightly: false
      asset_name_prefix: OpenSSH-GUI

  # --- JOB 2: RELEASE ---
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten and Prepare Assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets

          find artifacts -type f -exec cp {} release-assets/ \;

          cp LICENSE release-assets/LICENSE

          echo "Release Assets:"
          ls -la release-assets

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "release-assets/*"
          generate_release_notes: true

  deploy-aur:
    name: Update AUR Packages
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare for PKGBUILD update
        run: |
          rm -rf aur-assets
          mkdir -p aur-assets

          find artifacts -type f -exec cp {} aur-assets/ \;

          echo "AUR asset files:"
          ls -la aur-assets

          test -f aur-assets/OpenSSH-GUI-linux-x64
          test -f aur-assets/appicon.png
          test -f aur-assets/io.github.frequency403.openssh_gui.desktop
          test -f LICENSE

          VERSION=${GITHUB_REF_NAME#v}
          SHA_BIN=$(sha256sum aur-assets/OpenSSH-GUI-linux-x64 | cut -d' ' -f1)
          SHA_ICON=$(sha256sum aur-assets/appicon.png | cut -d' ' -f1)
          SHA_DESKTOP=$(sha256sum aur-assets/io.github.frequency403.openssh_gui.desktop | cut -d' ' -f1)
          SHA_LICENSE=$(sha256sum LICENSE | cut -d' ' -f1)

          sed -i "s/^pkgver=.*/pkgver=$VERSION/" openssh-gui-bin/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA_BIN' '$SHA_ICON' '$SHA_DESKTOP' '$SHA_LICENSE')/" openssh-gui-bin/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" openssh-gui-git/PKGBUILD

          echo "Updated openssh-gui-bin PKGBUILD:"
          grep -E '^(pkgver=|sha256sums=)' openssh-gui-bin/PKGBUILD

      - name: Update AUR (openssh-gui-bin)
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: openssh-gui-bin
          pkgbuild: ./openssh-gui-bin/PKGBUILD
          commit_username: ${{ github.repository_owner }}
          commit_email: ${{ github.repository_owner }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"

      - name: Update AUR (openssh-gui-git)
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: openssh-gui-git
          pkgbuild: ./openssh-gui-git/PKGBUILD
          commit_username: ${{ github.repository_owner }}
          commit_email: ${{ github.repository_owner }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
  
  winget:
    name: Update Winget Package
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Komac
        run: |
          KOMAC_URL=$(curl -fsSL https://api.github.com/repos/russellbanks/Komac/releases/latest \
            | grep -o '"browser_download_url": "[^"]*linux-amd64[^"]*"' \
            | grep -v '\.sha' \
            | head -1 \
            | cut -d'"' -f4)
          
          echo "Downloading Komac from: $KOMAC_URL"
          curl -fsSL "$KOMAC_URL" -o komac
          chmod +x komac
          ./komac --version

      - name: Update Winget manifest
        run: |
          ./komac update "frequency403.OpenSSHGUI" \
            --version "${{ steps.version.outputs.VERSION }}" \
            --urls "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/OpenSSH-GUI-win-x64.exe" \
            --submit \
            --token "${{ secrets.WINGET_GITHUB_TOKEN }}"