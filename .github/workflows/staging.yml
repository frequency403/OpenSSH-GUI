name: Staging / Nightly Build

on:
  push:
    branches:
      - development

permissions:
  contents: write

jobs:
  # --- JOB 0: PREPARE ---
  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      base_version: ${{ steps.meta.outputs.base_version }}
      git_hash: ${{ steps.meta.outputs.git_hash }}
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve metadata
        id: meta
        run: |
          HASH=$(git rev-parse --short HEAD)
          DATE=$(date +%Y-%m-%d)
          BASE_VERSION=$(grep -oPm1 '(?<=<BaseVersion>)[^<]+' Directory.Build.props)
          VERSION="${BASE_VERSION}+${HASH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "build_date=$DATE" >> "$GITHUB_OUTPUT"

  # --- JOB 1: BUILD ---
  build:
    needs: prepare
    uses: ./.github/workflows/build-and-package.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      is_nightly: true
      asset_name_prefix: OpenSSH-GUI-nightly

  # --- JOB 2: NIGHTLY RELEASE ---
  nightly-release:
    name: Create Nightly Release
    runs-on: ubuntu-latest
    needs: [prepare, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten and Prepare Assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets

          # Copy files from artifact subdirectories into a clean output directory.
          find artifacts -type f -exec cp {} release-assets/ \;

          cp LICENSE release-assets/LICENSE

          echo "Nightly Assets:"
          ls -la release-assets

      - name: Update nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES="**Branch:** \`development\`
          **Commit:** \`${{ needs.prepare.outputs.git_hash }}\`
          **Built:** ${{ needs.prepare.outputs.build_date }}
          
          > Automated nightly build — not intended for production use."
          
          if gh release view nightly &>/dev/null; then
            gh release edit nightly \
              --title "Nightly (${{ needs.prepare.outputs.build_date }}) — ${{ needs.prepare.outputs.version }}" \
              --notes "$NOTES" \
              --prerelease
          
            gh release view nightly --json assets --jq '.assets[].name' \
              | xargs -r -I{} gh release delete-asset nightly {} --yes
          
            find release-assets -type f -print0 | xargs -0 gh release upload nightly
          else
            gh release create nightly \
              --title "Nightly (${{ needs.prepare.outputs.build_date }}) — ${{ needs.prepare.outputs.version }}" \
              --notes "$NOTES" \
              --prerelease \
              $(find artifacts -type f)
          fi

  # --- JOB 3: AUR NIGHTLY ---
  deploy-aur-nightly:
    name: Update AUR Nightly Package
    runs-on: ubuntu-latest
    needs: [prepare, nightly-release]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./

      - name: Prepare for PKGBUILD update
        run: |
          # Move files from subdirectories to current directory
          find . -maxdepth 2 -mindepth 2 -type f -exec mv -t . {} +
          
          DATE=$(date +%Y%m%d)
          VERSION="${{ needs.prepare.outputs.base_version }}.${DATE}.${{ needs.prepare.outputs.git_hash }}"
          echo "AUR_VERSION=$VERSION" >> "$GITHUB_ENV"
          
          SHA_BIN=$(sha256sum OpenSSH-GUI-nightly-linux-x64 | cut -d' ' -f1)
          SHA_ICON=$(sha256sum appicon.png | cut -d' ' -f1)
          SHA_DESKTOP=$(sha256sum io.github.frequency403.openssh_gui.desktop | cut -d' ' -f1)
          SHA_LICENSE=$(sha256sum LICENSE | cut -d' ' -f1)

          sed -i "s/^pkgver=.*/pkgver=$VERSION/" openssh-gui-nightly/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA_BIN' '$SHA_ICON' '$SHA_DESKTOP' '$SHA_LICENSE')/" openssh-gui-nightly/PKGBUILD

      - name: Update AUR (openssh-gui-nightly)
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: openssh-gui-nightly
          pkgbuild: ./openssh-gui-nightly/PKGBUILD
          commit_username: ${{ github.repository_owner }}
          commit_email: ${{ github.repository_owner }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Nightly update ${{ env.AUR_VERSION }}"