name: Staging / Development Build

on:
  push:
    branches:
      - development

permissions:
  contents: write

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true  # Supersede previous run on rapid pushes

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Version
        id: version
        uses: ./.github/actions/determine-version

  deploy-aur-git:
    name: Update AUR Git Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ test, prepare ]

    steps:
      - name: Clone AUR repository
        run: |
          mkdir -p /tmp/aur-deploy
          cd /tmp/aur-deploy
          git clone ssh://aur@aur.archlinux.org/openssh-gui-git.git .
        env:
          GIT_SSH_COMMAND: ssh -i /tmp/aur_key -o StrictHostKeyChecking=no

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /tmp/aur_key
          chmod 600 /tmp/aur_key

      - name: Checkout OpenSSH-GUI repository
        uses: actions/checkout@v4
        with:
          path: openssh-gui-repo
          fetch-depth: 0

      - name: Copy and update PKGBUILD
        run: |
          cd /tmp/aur-deploy
          cp openssh-gui-repo/openssh-gui-git/PKGBUILD .
          
          DATE=$(date +%Y%m%d)
          HASH=$(cd openssh-gui-repo && git rev-parse --short HEAD)
          AUR_VERSION="${{ needs.prepare.outputs.version }}.${DATE}.${HASH}"
          
          sed -i "s/^pkgver=.*/pkgver=$AUR_VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          
          echo "Updated PKGBUILD with version: $AUR_VERSION"
          grep -E '^(pkgver=|pkgrel=)' PKGBUILD

      - name: Push to AUR
        run: |
          cd /tmp/aur-deploy
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"
          git add PKGBUILD
          git commit -m "Development update ${{ needs.prepare.outputs.tag }}" || echo "No changes to commit"
          git push -u origin master
        env:
          GIT_SSH_COMMAND: ssh -i /tmp/aur_key -o StrictHostKeyChecking=no
