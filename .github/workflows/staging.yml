name: Staging / Development Build

on:
  push:
    branches:
      - development

permissions:
  contents: write

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true  # Supersede previous run on rapid pushes

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  prepare:
    name: Prepare Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Version
        id: version
        uses: ./.github/actions/determine-version

  deploy-aur-git:
    name: Update AUR Git Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ test, prepare ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          cat >> ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            StrictHostKeyChecking no
          EOF

      - name: Update PKGBUILD
        run: |
          set -euo pipefail
          DATE=$(date +%Y%m%d)
          HASH=$(git rev-parse --short HEAD)
          AUR_VERSION="${{ needs.prepare.outputs.version }}.${DATE}.${HASH}"
          
          sed -i "s/^pkgver=.*/pkgver=$AUR_VERSION/" openssh-gui-git/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" openssh-gui-git/PKGBUILD
          
          echo "Updated PKGBUILD:"
          grep -E '^(pkgver=|pkgrel=)' openssh-gui-git/PKGBUILD

      - name: Clone and push to AUR
        run: |
          set -euo pipefail
          
          # Clone AUR repository to temporary location
          cd /tmp
          rm -rf aur-deploy
          mkdir aur-deploy
          cd aur-deploy
          git clone ssh://aur@aur.archlinux.org/openssh-gui-git.git .
          git checkout -B master origin/master
          
          # Copy updated PKGBUILD from original repo
          cp $GITHUB_WORKSPACE/openssh-gui-git/PKGBUILD .

          docker run --rm -v "$(pwd)":/pkg -w /pkg archlinux:latest \
          bash -c "pacman -Sy --noconfirm --needed pacman && makepkg --printsrcinfo > .SRCINFO"
      
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"
      
          git add PKGBUILD .SRCINFO
          git commit -m "Development update ${{ needs.prepare.outputs.tag }}" || true
          git push origin master
