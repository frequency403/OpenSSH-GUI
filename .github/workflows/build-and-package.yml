name: Build and Package

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      is_nightly:
        required: false
        type: boolean
        default: false
      asset_name_prefix:
        required: false
        type: string
        default: 'OpenSSH-GUI'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false   # One failing target must not kill the others
      matrix:
        include:
          - target: linux-x64
            asset_extension: ''
          - target: win-x64
            asset_extension: '.exe'
          - target: osx-x64
            asset_extension: ''

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Setup .NET environment
        uses: ./.github/actions/dotnet-setup

      - name: Normalize version and build flags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

          EXTRA_ARGS=""
          if [[ "${{ inputs.is_nightly }}" == "true" ]]; then
            EXTRA_ARGS="-p:IsNightly=true"
          fi
          echo "EXTRA_ARGS=$EXTRA_ARGS" >> "$GITHUB_OUTPUT"

      - name: Publish application
        uses: ./.github/actions/dotnet-publish
        with:
          project-path: OpenSSH_GUI/OpenSSH_GUI.csproj
          runtime: ${{ matrix.target }}
          version: ${{ steps.meta.outputs.VERSION }}
          output-dir: ./publish
          extra-msbuild-args: ${{ steps.meta.outputs.EXTRA_ARGS }}

      - name: Rename artifact for distribution
        id: rename
        shell: bash
        run: |
          set -euo pipefail
          ASSET_NAME="${{ inputs.asset_name_prefix }}-${{ matrix.target }}${{ matrix.asset_extension }}"
          SOURCE="./publish/OpenSSH_GUI${{ matrix.asset_extension }}"
          if [[ ! -f "$SOURCE" ]]; then
            echo "::error::Expected build output not found: $SOURCE"
            exit 1
          fi
          mv "$SOURCE" "./publish/$ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        if: matrix.target == 'linux-x64'
        id: appimage
        uses: ./.github/actions/build-appimage
        with:
          binary-path: ./publish/${{ steps.rename.outputs.ASSET_NAME }}
          version: ${{ steps.meta.outputs.VERSION }}
          is-nightly: ${{ inputs.is_nightly }}
          asset-prefix: ${{ inputs.asset_name_prefix }}

      - name: Upload AppImage
        if: matrix.target == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.appimage.outputs.appimage-name }}
          path: ${{ steps.appimage.outputs.appimage-name }}
          if-no-files-found: error

      - name: Upload .desktop file
        if: matrix.target == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: io.github.frequency403.openssh_gui.desktop
          path: AppDir/usr/share/applications/io.github.frequency403.openssh_gui.desktop
          if-no-files-found: error

      - name: Upload app icon
        if: matrix.target == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: appicon
          path: AppDir/appicon.png
          if-no-files-found: error

      - name: Upload platform binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.ASSET_NAME }}
          path: ./publish/${{ steps.rename.outputs.ASSET_NAME }}
          if-no-files-found: error